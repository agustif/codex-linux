name: Lint CI Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color .github/workflows/ci.yml .github/workflows/lint-ci.yml

  shellcheck:
    name: ShellCheck Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './scripts'
          additional_files: 'build.sh quick-build.sh generate-icons.sh'
