name: Build Multi-Architecture Releases

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      codex_version:
        description: 'Codex.app version (latest or X.Y.Z)'
        required: false
        default: 'latest'
      architectures:
        description: 'Architectures to build (comma-separated: x86_64,arm64,armv7l,aarch64)'
        required: false
        default: 'x86_64,arm64'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      codex_version: ${{ steps.version.outputs.codex_version }}
      build_archs: ${{ steps.version.outputs.archs }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect versions
        id: version
        run: |
          # Repo version from git tag or fallback
          REPO_VERSION=$(git describe --tags --always 2>/dev/null | sed 's/^v//' || echo "0.1.0-dev")
          echo "version=$REPO_VERSION" >> $GITHUB_OUTPUT
          
          # Codex version
          CODEX_VERSION="${{ github.event.inputs.codex_version }}"
          if [ "$CODEX_VERSION" = "latest" ] || [ -z "$CODEX_VERSION" ]; then
            CODEX_VERSION=$(curl -s https://api.github.com/repos/openai/codex/releases/latest \
              | grep -o '"tag_name": "[^"]*' | head -1 | cut -d'"' -f4 | sed 's/v//' || echo "0.1.0")
          fi
          echo "codex_version=$CODEX_VERSION" >> $GITHUB_OUTPUT
          
          # Architectures
          ARCHS="${{ github.event.inputs.architectures }}"
          [ -z "$ARCHS" ] && ARCHS="x86_64,arm64,armv7l"
          echo "archs=$ARCHS" >> $GITHUB_OUTPUT
          
          echo "Building codex-rs v$CODEX_VERSION with architectures: $ARCHS"

  build-linux:
    needs: detect-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 (Intel/AMD 64-bit)
          - arch: x86_64
            runner: ubuntu-latest
            docker_arch: amd64
            electron_arch: x64
            
          # ARM64 (Apple Silicon, AWS Graviton, Raspberry Pi)
          - arch: arm64
            runner: ubuntu-latest
            docker_arch: arm64
            electron_arch: arm64
            
          # ARMv7 (32-bit ARM, older Raspberry Pi)
          - arch: armv7l
            runner: ubuntu-latest
            docker_arch: arm/v7
            electron_arch: armv7l
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        if: matrix.arch != 'x86_64' || runner.os != 'macos'

      - name: Download Codex.app
        id: download
        run: |
          CODEX_VERSION="${{ needs.detect-version.outputs.codex_version }}"
          echo "Downloading Codex.app v$CODEX_VERSION for ${{ matrix.arch }}..."
          
          # For macOS builds, need actual DMG
          # For Linux builds, we extract DMG in Docker
          DMG_URL="https://storage.googleapis.com/codex-releases/Codex-${CODEX_VERSION}.dmg"
          
          if ! curl -L -f --progress-bar "$DMG_URL" -o Codex.dmg 2>/dev/null; then
            # Fallback sources
            for URL in \
              "https://codex-releases.s3.amazonaws.com/Codex-${CODEX_VERSION}.dmg" \
              "https://github.com/openai/codex/releases/download/v${CODEX_VERSION}/Codex-${CODEX_VERSION}.dmg"; do
              if curl -L -f --progress-bar "$URL" -o Codex.dmg 2>/dev/null; then
                break
              fi
            done
          fi
          
          if [ ! -f Codex.dmg ]; then
            echo "⚠ Warning: Codex.app download failed, will continue with existing app/ directory"
          else
            echo "✓ Downloaded $(du -h Codex.dmg | cut -f1)"
          fi

      - name: Prepare Docker build context
        run: |
          # Create build-specific Dockerfile for this architecture
          mkdir -p docker-build-${{ matrix.arch }}
          
          cat > docker-build-${{ matrix.arch }}/Dockerfile << 'DOCKERFILE_EOF'
          FROM ubuntu:22.04
          
          # Install build dependencies
          RUN apt-get update && apt-get install -y \
              build-essential curl wget git pkg-config \
              libssl-dev libcap-dev ca-certificates \
              libsecret-1-dev libgtk-3-0 libnotify4 \
              libnss3 libxss1 libxtst6 xdg-utils \
              libatspi2.0-0 libuuid1 libappindicator3-1 \
              libasound2 libfuse2 file 7zip-full xar \
              && rm -rf /var/lib/apt/lists/*
          
          # Install Node
          RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
              apt-get install -y nodejs && rm -rf /var/lib/apt/lists/*
          
          # Install Rust for this architecture
          RUN curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          
          ENV PATH="/root/.cargo/bin:$PATH"
          WORKDIR /build
          COPY . /build/
          
          # Build script will be run at container runtime
          DOCKERFILE_EOF

      - name: Build ${{ matrix.arch }} packages
        run: |
          ARCH="${{ matrix.arch }}"
          DOCKER_ARCH="${{ matrix.docker_arch }}"
          CODEX_VERSION="${{ needs.detect-version.outputs.codex_version }}"
          REPO_VERSION="${{ needs.detect-version.outputs.version }}"
          
          echo "Building for $ARCH (Docker: $DOCKER_ARCH)"
          
          # Create arch-specific build script
          cat > /tmp/build-${ARCH}.sh << 'BUILD_SCRIPT_EOF'
          #!/bin/bash
          set -ex
          
          ARCH=$1
          CODEX_VERSION=$2
          
          cd /build
          
          echo "[1/5] Building Rust binary..."
          cd codex-oss/codex-rs
          cargo build --release -p codex-app-server -vv
          cd -
          
          mkdir -p codex-linux-fork/bin
          cp codex-oss/codex-rs/target/release/codex-app-server codex-linux-fork/bin/codex
          chmod +x codex-linux-fork/bin/codex
          echo "✓ Rust binary built: $(du -h codex-linux-fork/bin/codex | cut -f1)"
          
          echo "[2/5] Downloading ripgrep..."
          case "$ARCH" in
            x86_64)
              RG_URL="https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz"
              ;;
            arm64|aarch64)
              RG_URL="https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-aarch64-unknown-linux-gnu.tar.gz"
              ;;
            armv7l)
              RG_URL="https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-armv7-unknown-linux-gnueabihf.tar.gz"
              ;;
            *)
              echo "Unknown architecture: $ARCH"
              exit 1
              ;;
          esac
          
          curl -sL "$RG_URL" | tar xz -C codex-linux-fork/resources --strip-components=1 2>/dev/null && \
            chmod +x codex-linux-fork/resources/rg || echo "ripgrep download failed"
          echo "✓ ripgrep ready"
          
          echo "[3/5] Installing Node dependencies..."
          cd codex-linux-fork
          npm install --production
          echo "✓ Dependencies installed"
          
          echo "[4/4] Building packages..."
          npm run build:linux
          
          echo "[5/5] Creating checksums..."
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          
          echo "✓ Build complete for $ARCH"
          BUILD_SCRIPT_EOF
          
          chmod +x /tmp/build-${ARCH}.sh
          
          # Run build
          docker run --rm \
            --platform linux/${DOCKER_ARCH} \
            --volume $(pwd):/build \
            --volume /tmp/build-${ARCH}.sh:/build.sh:ro \
            -e CARGO_TARGET_DIR=/build/codex-oss/codex-rs/target \
            ubuntu:22.04 \
            bash /build.sh "$ARCH" "$CODEX_VERSION"

      - name: Prepare artifacts
        if: always()
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p artifacts-${ARCH}
          
          # Copy packages
          if [ -d codex-linux-fork/dist ]; then
            cp codex-linux-fork/dist/* artifacts-${ARCH}/ 2>/dev/null || true
          fi
          
          # Copy binary
          if [ -f codex-linux-fork/bin/codex ]; then
            cp codex-linux-fork/bin/codex artifacts-${ARCH}/codex-${ARCH}
          fi
          
          # Create metadata
          cat > artifacts-${ARCH}/BUILD_INFO.txt << EOF
          Architecture: $ARCH
          Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Repo Version: ${{ needs.detect-version.outputs.version }}
          Codex Version: ${{ needs.detect-version.outputs.codex_version }}
          EOF
          
          ls -lh artifacts-${ARCH}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-linux-${{ matrix.arch }}
          path: artifacts-${{ matrix.arch }}/
          retention-days: 30

  merge-artifacts:
    needs: build-linux
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          
          # Organize by architecture
          for arch_dir in all-artifacts/codex-linux-*/; do
            arch=$(basename "$arch_dir" | sed 's/codex-linux-//')
            mkdir -p "release-assets/$arch"
            cp "$arch_dir"/* "release-assets/$arch/" 2>/dev/null || true
          done
          
          # Create comprehensive checksums
          cd release-assets
          find . -type f ! -name "SHA256SUMS*" | sort | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS
          
          # Create manifest
          cat > MANIFEST.md << 'MANIFEST_EOF'
          # Codex Linux Release Manifest
          
          Built: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Available Architectures
          
          MANIFEST_EOF
          
          for arch in $(ls); do
            if [ -d "$arch" ]; then
              echo "### $arch" >> MANIFEST.md
              echo "" >> MANIFEST.md
              ls -lh "$arch" | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> MANIFEST.md
              echo "" >> MANIFEST.md
            fi
          done
          
          cat MANIFEST.md
          cd -

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/**/*
          body_path: MANIFEST.md
          draft: false
          prerelease: false

      - name: Create workflow summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # Build Summary
          
          - **Version**: ${{ needs.detect-version.outputs.version }}
          - **Codex Version**: ${{ needs.detect-version.outputs.codex_version }}
          - **Architectures**: ${{ needs.detect-version.outputs.build_archs }}
          
          ## Artifacts
          
          EOF
          
          ls -lh release-assets/*/  | tail -20 >> $GITHUB_STEP_SUMMARY

  publish-docker:
    needs: [detect-version, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Build and push multi-arch Docker images
        run: |
          REPO_VERSION="${{ needs.detect-version.outputs.version }}"
          CODEX_VERSION="${{ needs.detect-version.outputs.codex_version }}"
          
          echo "Publishing Docker images for v$REPO_VERSION (Codex $CODEX_VERSION)"
          
          # Note: Requires Docker registry credentials in secrets
          # Example with Docker Hub:
          # echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # For now, just create Dockerfile
          cat > Dockerfile.release << 'EOF'
          FROM ubuntu:22.04
          
          COPY artifacts/ /opt/codex/
          
          RUN apt-get update && apt-get install -y \
              libsecret-1-0 libgtk-3-0 libnotify4 \
              libnss3 libxss1 libxtst6 libatspi2.0-0 \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /opt/codex
          
          # Support multiple architectures through symlink
          RUN if [ -f codex-x86_64 ]; then ln -s codex-x86_64 codex; fi && \
              if [ -f codex-arm64 ]; then ln -s codex-arm64 codex; fi && \
              if [ -f codex-armv7l ]; then ln -s codex-armv7l codex; fi
          
          ENTRYPOINT ["/opt/codex/codex"]
          EOF
          
          echo "Docker image ready. Build with:"
          echo "  docker buildx build --platform linux/amd64,linux/arm64,linux/arm/v7 -t codex:$REPO_VERSION ."
